name: Project Status Sync

on:
  issues:
    types: [labeled, assigned]
  pull_request:
    types: [opened, ready_for_review, closed]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  issue-to-in-progress:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - name: Move issue to In progress
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_AUTOMATION_TOKEN || github.token }}
          script: |
            const projectNumberRaw = process.env.PROJECT_NUMBER;
            const projectOwner = process.env.PROJECT_OWNER || context.repo.owner;
            const statusFieldName = process.env.STATUS_FIELD_NAME || 'Status';
            const inProgressName = process.env.STATUS_IN_PROGRESS || 'In progress';

            if (!projectNumberRaw) {
              core.notice('PROJECT_NUMBER repo variable is not set; skipping project status sync.');
              return;
            }

            const issue = context.payload.issue;
            const issueNodeId = issue?.node_id;
            if (!issueNodeId) {
              core.notice('No issue node id in payload; skipping.');
              return;
            }

            const eventName = context.payload.action;
            const labelName = context.payload.label?.name;
            const shouldMove = eventName === 'assigned' || labelName === 'status:in-progress';
            if (!shouldMove) {
              core.info('Issue event does not require status change.');
              return;
            }

            const projectNumber = Number(projectNumberRaw);

            async function getProject(owner, number) {
              const orgQuery = `
                query($owner: String!, $number: Int!) {
                  organization(login: $owner) {
                    projectV2(number: $number) {
                      id
                      fields(first: 50) {
                        nodes {
                          ... on ProjectV2FieldCommon { id name }
                          ... on ProjectV2SingleSelectField { id name options { id name } }
                        }
                      }
                    }
                  }
                }
              `;

              const userQuery = `
                query($owner: String!, $number: Int!) {
                  user(login: $owner) {
                    projectV2(number: $number) {
                      id
                      fields(first: 50) {
                        nodes {
                          ... on ProjectV2FieldCommon { id name }
                          ... on ProjectV2SingleSelectField { id name options { id name } }
                        }
                      }
                    }
                  }
                }
              `;

              try {
                const orgResult = await github.graphql(orgQuery, { owner, number });
                if (orgResult.organization?.projectV2) return orgResult.organization.projectV2;
              } catch (_) {}

              const userResult = await github.graphql(userQuery, { owner, number });
              return userResult.user?.projectV2;
            }

            async function findProjectItemId(projectId, contentId) {
              let cursor = null;
              while (true) {
                const result = await github.graphql(`
                  query($projectId: ID!, $cursor: String) {
                    node(id: $projectId) {
                      ... on ProjectV2 {
                        items(first: 100, after: $cursor) {
                          pageInfo { hasNextPage endCursor }
                          nodes {
                            id
                            content {
                              ... on Issue { id }
                            }
                          }
                        }
                      }
                    }
                  }
                `, { projectId, cursor });

                const items = result.node.items.nodes;
                const match = items.find((item) => item.content?.id === contentId);
                if (match) return match.id;

                const pageInfo = result.node.items.pageInfo;
                if (!pageInfo.hasNextPage) return null;
                cursor = pageInfo.endCursor;
              }
            }

            const project = await getProject(projectOwner, projectNumber);
            if (!project) {
              core.notice(`Project not found for ${projectOwner}#${projectNumber}; skipping.`);
              return;
            }

            const statusField = project.fields.nodes.find((field) => field.name === statusFieldName && field.options);
            if (!statusField) {
              core.setFailed(`Status field '${statusFieldName}' not found on project.`);
              return;
            }

            const statusOption = statusField.options.find((option) => option.name === inProgressName);
            if (!statusOption) {
              core.setFailed(`Status option '${inProgressName}' not found.`);
              return;
            }

            const itemId = await findProjectItemId(project.id, issueNodeId);
            if (!itemId) {
              core.notice(`Issue #${issue.number} is not in project; skipping.`);
              return;
            }

            await github.graphql(`
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(
                  input: {
                    projectId: $projectId
                    itemId: $itemId
                    fieldId: $fieldId
                    value: { singleSelectOptionId: $optionId }
                  }
                ) {
                  projectV2Item { id }
                }
              }
            `, {
              projectId: project.id,
              itemId,
              fieldId: statusField.id,
              optionId: statusOption.id
            });

            core.info(`Moved issue #${issue.number} to '${inProgressName}'.`);
        env:
          PROJECT_OWNER: ${{ vars.PROJECT_OWNER || github.repository_owner }}
          PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER }}
          STATUS_FIELD_NAME: ${{ vars.STATUS_FIELD_NAME || 'Status' }}
          STATUS_IN_PROGRESS: ${{ vars.STATUS_IN_PROGRESS || 'In progress' }}

  pr-to-review-or-done:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Sync linked issues to In review / Done
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_AUTOMATION_TOKEN || github.token }}
          script: |
            const projectNumberRaw = process.env.PROJECT_NUMBER;
            const projectOwner = process.env.PROJECT_OWNER || context.repo.owner;
            const statusFieldName = process.env.STATUS_FIELD_NAME || 'Status';
            const inReviewName = process.env.STATUS_IN_REVIEW || 'In review';
            const doneName = process.env.STATUS_DONE || 'Done';

            if (!projectNumberRaw) {
              core.notice('PROJECT_NUMBER repo variable is not set; skipping project status sync.');
              return;
            }

            const pr = context.payload.pull_request;
            const isMerged = context.payload.action === 'closed' && pr?.merged === true;
            const targetStatusName = isMerged ? doneName : inReviewName;

            if (!pr) {
              core.notice('No pull request payload; skipping.');
              return;
            }

            const text = `${pr.title || ''}\n${pr.body || ''}`;
            const matches = [...text.matchAll(/(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi)];
            const issueNumbers = [...new Set(matches.map((m) => Number(m[1])).filter(Boolean))];

            if (issueNumbers.length === 0) {
              core.notice('No linked issues detected via closing keywords; skipping.');
              return;
            }

            const projectNumber = Number(projectNumberRaw);

            async function getProject(owner, number) {
              const orgQuery = `
                query($owner: String!, $number: Int!) {
                  organization(login: $owner) {
                    projectV2(number: $number) {
                      id
                      fields(first: 50) {
                        nodes {
                          ... on ProjectV2FieldCommon { id name }
                          ... on ProjectV2SingleSelectField { id name options { id name } }
                        }
                      }
                    }
                  }
                }
              `;

              const userQuery = `
                query($owner: String!, $number: Int!) {
                  user(login: $owner) {
                    projectV2(number: $number) {
                      id
                      fields(first: 50) {
                        nodes {
                          ... on ProjectV2FieldCommon { id name }
                          ... on ProjectV2SingleSelectField { id name options { id name } }
                        }
                      }
                    }
                  }
                }
              `;

              try {
                const orgResult = await github.graphql(orgQuery, { owner, number });
                if (orgResult.organization?.projectV2) return orgResult.organization.projectV2;
              } catch (_) {}

              const userResult = await github.graphql(userQuery, { owner, number });
              return userResult.user?.projectV2;
            }

            async function findIssueNodeId(issueNumber) {
              const result = await github.graphql(`
                query($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    issue(number: $number) { id number }
                  }
                }
              `, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                number: issueNumber
              });
              return result.repository?.issue?.id;
            }

            async function findProjectItemId(projectId, contentId) {
              let cursor = null;
              while (true) {
                const result = await github.graphql(`
                  query($projectId: ID!, $cursor: String) {
                    node(id: $projectId) {
                      ... on ProjectV2 {
                        items(first: 100, after: $cursor) {
                          pageInfo { hasNextPage endCursor }
                          nodes {
                            id
                            content {
                              ... on Issue { id }
                            }
                          }
                        }
                      }
                    }
                  }
                `, { projectId, cursor });

                const items = result.node.items.nodes;
                const match = items.find((item) => item.content?.id === contentId);
                if (match) return match.id;

                const pageInfo = result.node.items.pageInfo;
                if (!pageInfo.hasNextPage) return null;
                cursor = pageInfo.endCursor;
              }
            }

            const project = await getProject(projectOwner, projectNumber);
            if (!project) {
              core.notice(`Project not found for ${projectOwner}#${projectNumber}; skipping.`);
              return;
            }

            const statusField = project.fields.nodes.find((field) => field.name === statusFieldName && field.options);
            if (!statusField) {
              core.setFailed(`Status field '${statusFieldName}' not found on project.`);
              return;
            }

            const statusOption = statusField.options.find((option) => option.name === targetStatusName);
            if (!statusOption) {
              core.setFailed(`Status option '${targetStatusName}' not found.`);
              return;
            }

            for (const issueNumber of issueNumbers) {
              const issueNodeId = await findIssueNodeId(issueNumber);
              if (!issueNodeId) {
                core.notice(`Issue #${issueNumber} not found in repo; skipping.`);
                continue;
              }

              const itemId = await findProjectItemId(project.id, issueNodeId);
              if (!itemId) {
                core.notice(`Issue #${issueNumber} not in project; skipping.`);
                continue;
              }

              await github.graphql(`
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                  updateProjectV2ItemFieldValue(
                    input: {
                      projectId: $projectId
                      itemId: $itemId
                      fieldId: $fieldId
                      value: { singleSelectOptionId: $optionId }
                    }
                  ) {
                    projectV2Item { id }
                  }
                }
              `, {
                projectId: project.id,
                itemId,
                fieldId: statusField.id,
                optionId: statusOption.id
              });

              core.info(`Moved issue #${issueNumber} to '${targetStatusName}'.`);
            }
        env:
          PROJECT_OWNER: ${{ vars.PROJECT_OWNER || github.repository_owner }}
          PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER }}
          STATUS_FIELD_NAME: ${{ vars.STATUS_FIELD_NAME || 'Status' }}
          STATUS_IN_REVIEW: ${{ vars.STATUS_IN_REVIEW || 'In review' }}
          STATUS_DONE: ${{ vars.STATUS_DONE || 'Done' }}
